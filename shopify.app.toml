# Learn more about configuring your app at https://shopify.dev

client_id = "e9211e548bd3fc154cffc2f3d51f94f8"
# CRITICAL: Replace this ngrok domain with your live hosted URL (e.g. Render, Heroku) before submitting
application_url = "https://netliy-review.ravendra-gautam95.workers.dev"
embedded = true
name = "Netliy Reviews"

[access_scopes]
# Learn more at https://shopify.dev#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions,write_customers,read_customers"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
uri = "/webhooks/app/uninstalled"
topics = [ "app/uninstalled" ]

[[webhooks.subscriptions]]
uri = "/webhooks/app/scopes_update"
topics = [ "app/scopes_update" ]

# --- ADDED FOR MANDATORY GDPR COMPLIANCE ---
[[webhooks.subscriptions]]
uri = "/webhooks/compliance"
compliance_topics = [
  "customers/data_request",
  "customers/redact",
  "shop/redact"
]

[auth]
# CRITICAL: Replace this ngrok domain with your live hosted URL as well
redirect_urls = [ "https://netliy-review.ravendra-gautam95.workers.dev/auth" ]

[build]
automatically_update_urls_on_dev = true
